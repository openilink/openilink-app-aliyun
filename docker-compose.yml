services:
  app:
    build: .
    ports:
      - "8100:8100"
    environment:
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      ALIYUN_ACCESS_KEY_ID: "${ALIYUN_ACCESS_KEY_ID}"
      ALIYUN_ACCESS_KEY_SECRET: "${ALIYUN_ACCESS_KEY_SECRET}"
      ALIYUN_REGION: "${ALIYUN_REGION:-cn-hangzhou}"
      DB_PATH: /data/aliyun.db
    volumes:
      - app-data:/data
    restart: unless-stopped

volumes:
  app-data:
